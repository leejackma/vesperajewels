<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - Vespera Jewels Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #C5A467;
            --gold-dark: #B8924A;
            --bg: #FAFAF8;
            --white: #FFFFFF;
            --dark: #0F0F0F;
            --text: #1A1A1A;
            --text-secondary: #8A8A8A;
            --border: #E8E4DE;
            --sidebar-width: 280px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--gold);
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .user-info {
            padding: 15px 25px;
            background: var(--bg);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 600;
            font-size: 14px;
        }

        .user-name {
            flex: 1;
            font-weight: 500;
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            color: #EF4444;
            background: #FEE2E2;
        }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 15px 0;
        }

        .nav-section {
            margin-bottom: 5px;
        }

        .nav-section-title {
            padding: 10px 25px 5px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 25px;
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            gap: 12px;
        }

        .nav-item:hover {
            background: var(--bg);
            color: var(--gold);
        }

        .nav-item.active {
            background: rgba(197, 164, 103, 0.08);
            color: var(--gold);
            border-left-color: var(--gold);
            font-weight: 500;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
        }

        .sidebar-footer {
            padding: 20px 25px;
            border-top: 1px solid var(--border);
        }

        .save-btn {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .save-btn:hover:not(:disabled) {
            background: var(--gold-dark);
        }

        .save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .save-btn.saving {
            position: relative;
            color: transparent;
        }

        .save-btn.saving::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid var(--white);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            padding: 30px;
        }

        .content-header {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .content-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--text);
        }

        .content-header p {
            color: var(--text-secondary);
            margin-top: 5px;
            font-size: 14px;
        }

        /* Editor Panel */
        .editor-panel {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .panel-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .panel-tab {
            padding: 15px 25px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .panel-tab:hover {
            color: var(--text);
        }

        .panel-tab.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
            background: var(--white);
        }

        .panel-content {
            padding: 30px;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* Form Styles */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
        }

        label .hint {
            font-weight: 400;
            color: var(--text-secondary);
            font-size: 12px;
        }

        input[type="text"],
        input[type="number"],
        input[type="url"],
        input[type="color"],
        textarea,
        select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            transition: all 0.2s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(197, 164, 103, 0.1);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        input[type="color"] {
            height: 44px;
            padding: 4px;
            cursor: pointer;
        }

        /* List Editor */
        .list-editor {
            background: var(--bg);
            border-radius: 8px;
            padding: 15px;
        }

        .list-item {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .list-item:last-child {
            margin-bottom: 0;
        }

        .list-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .list-item-title {
            font-weight: 500;
            font-size: 14px;
        }

        .list-item-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add {
            background: var(--gold);
            color: var(--white);
        }

        .btn-add:hover {
            background: var(--gold-dark);
        }

        .btn-remove {
            background: #FEE2E2;
            color: #991B1B;
        }

        .btn-remove:hover {
            background: #FECACA;
        }

        .btn-edit {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-edit:hover {
            background: var(--border);
        }

        .nested-fields {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .nested-fields .form-group {
            margin-bottom: 0;
        }

        /* Image Preview */
        .image-preview {
            margin-top: 10px;
            max-width: 200px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .image-preview img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #A7F3D0;
        }

        .toast.error {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FECACA;
        }

        .toast-icon {
            width: 20px;
            height: 20px;
        }

        /* Section Divider */
        .section-divider {
            grid-column: 1 / -1;
            padding: 20px 0;
            margin: 10px 0;
            border-top: 1px solid var(--border);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: var(--gold);
            margin-bottom: 15px;
        }

        /* Mobile Menu Toggle */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 200;
            width: 44px;
            height: 44px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        .mobile-toggle svg {
            width: 20px;
            height: 20px;
            stroke: var(--text);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 99;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            stroke: var(--border);
            margin-bottom: 20px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .mobile-toggle {
                display: flex;
            }

            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .overlay.open {
                display: block;
            }

            .main-content {
                margin-left: 0;
                padding: 80px 20px 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading State */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(250, 250, 248, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }

        .loading-spinner {
            text-align: center;
        }

        .loading-spinner svg {
            width: 50px;
            height: 50px;
            stroke: var(--gold);
            animation: rotate 2s linear infinite;
        }

        .loading-spinner p {
            margin-top: 15px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        /* Image Upload Component */
        .image-upload-wrapper {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
        }

        .image-upload-preview {
            position: relative;
            max-width: 200px;
            margin-bottom: 12px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .image-upload-preview img {
            width: 100%;
            height: auto;
            display: block;
        }

        .image-upload-preview .remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .image-upload-preview .remove-btn:hover {
            background: rgba(239, 68, 68, 0.8);
        }

        .image-size-hint {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .image-size-hint svg {
            width: 14px;
            height: 14px;
        }

        .image-upload-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            background: var(--gold);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-btn:hover:not(:disabled) {
            background: var(--gold-dark);
        }

        .upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .upload-btn svg {
            width: 18px;
            height: 18px;
        }

        .url-toggle {
            font-size: 12px;
            color: var(--text-secondary);
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px 0;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .url-toggle:hover {
            color: var(--gold);
        }

        .url-toggle svg {
            width: 14px;
            height: 14px;
            transition: transform 0.2s;
        }

        .url-toggle.expanded svg {
            transform: rotate(180deg);
        }

        .url-input-wrapper {
            display: none;
            margin-top: 8px;
        }

        .url-input-wrapper.show {
            display: block;
        }

        .url-input-wrapper input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
        }

        .url-input-wrapper input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .upload-progress {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(197, 164, 103, 0.1);
            border-radius: 6px;
            font-size: 12px;
            color: var(--gold);
        }

        .upload-progress.show {
            display: flex;
        }

        .upload-progress .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--gold);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Hidden file input */
        .file-input-hidden {
            display: none;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding: 10px 0;
        }

        .product-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        .product-card-image {
            position: relative;
            width: 100%;
            height: 200px;
            background: var(--bg);
            overflow: hidden;
        }

        .product-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-card-image .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: var(--text-secondary);
        }

        .product-card-image .placeholder svg {
            width: 48px;
            height: 48px;
            stroke: var(--border);
        }

        .product-card-body {
            padding: 16px;
        }

        .product-card-category {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--gold);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .product-card-name {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .product-card-price {
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 12px;
        }

        .product-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .product-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .product-status.published {
            background: #D1FAE5;
            color: #065F46;
        }

        .product-status.draft {
            background: #FEF3C7;
            color: #92400E;
        }

        .product-card-actions {
            display: flex;
            gap: 8px;
        }

        .product-card-actions button {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .product-card-actions .btn-edit {
            background: var(--gold);
            color: var(--white);
        }

        .product-card-actions .btn-edit:hover {
            background: var(--gold-dark);
        }

        .product-card-actions .btn-delete {
            background: #FEE2E2;
            color: #991B1B;
        }

        .product-card-actions .btn-delete:hover {
            background: #FECACA;
        }

        /* Add Product Button */
        .add-product-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: var(--gold);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-product-btn:hover {
            background: var(--gold-dark);
        }

        .add-product-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Product Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .product-modal {
            background: var(--white);
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            max-height: calc(100vh - 80px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .product-modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg);
        }

        .product-modal-header h3 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--gold);
        }

        .product-modal-close {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            color: var(--text-secondary);
            border-radius: 6px;
            transition: all 0.2s;
        }

        .product-modal-close:hover {
            background: var(--border);
            color: var(--text);
        }

        .product-modal-body {
            padding: 25px;
            overflow-y: auto;
            flex: 1;
        }

        .product-modal-footer {
            padding: 20px 25px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: var(--bg);
        }

        .product-modal-footer button {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .product-modal-footer .btn-cancel {
            background: var(--white);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .product-modal-footer .btn-cancel:hover {
            background: var(--bg);
        }

        .product-modal-footer .btn-save {
            background: var(--gold);
            border: none;
            color: var(--white);
        }

        .product-modal-footer .btn-save:hover {
            background: var(--gold-dark);
        }

        /* Category Manager Styles */
        .category-manager-modal {
            background: var(--white);
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            max-height: calc(100vh - 80px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

            width: 0;
            height: 0;

            top: 0;
            left: 0;
            right: 0;

            transition: 0.3s;

            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {

        const imageConfig = {

            'image': { width: 600, height: 600, desc: '产品图片' },
            'images': { width: 800, height: 600, desc: '案例图片' }
        };

        function getImageConfig(fieldName, section) {
            // Check for specific section+field combinations
            if (section === 'home' && fieldName === 'hero_image') {
                return { width: 1920, height: 1080, desc: '横幅背景图' };
            }
            if (section === 'about' && fieldName === 'story_image') {
                return { width: 800, height: 600, desc: '故事配图' };

            if (section === 'process' && fieldName === 'image') {
                return { width: 600, height: 400, desc: '步骤图' };

            if (section === 'partner' && fieldName === 'images') {
                return { width: 800, height: 600, desc: '案例图' };
            }
            if ((section === 'jewelry-products' || section === 'watch-products') && fieldName === 'image') {
                return { width: 600, height: 600, desc: '产品图片' };
            }
            // Fallback
            if (imageConfig[fieldName]) {
                return imageConfig[fieldName];
            }
            return { width: 800, height: 600, desc: '通用图片' };
        }

        // Generate unique filename
        function generateImageFilename(section, fieldName, extension) {
            const timestamp = Date.now();
            const cleanSection = section.replace(/-/g, '_');
            const cleanField = fieldName.replace(/\[.*\]/, '').replace(/[^a-zA-Z0-9]/g, '_');
            return `${cleanSection}_${cleanField}_${timestamp}.${extension}`;
        }

        // Upload image to GitHub
        async function uploadImageToGitHub(file, section, fieldName) {
            return new Promise(async (resolve, reject) => {
                try {
                    // Read file as base64
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const base64 = e.target.result.split(',')[1];
                        const extension = file.name.split('.').pop().toLowerCase();
                        const filename = generateImageFilename(section, fieldName, extension);
                        const path = `assets/uploads/${filename}`;

                        // Check if file exists and get sha
                        let sha = null;
                        try {
                            const checkResponse = await fetch(`${API_BASE}/${path}?t=${Date.now()}`, {
                                headers: {
                                    'Authorization': `Bearer ${token}`,
                                    'Accept': 'application/vnd.github.v3+json'
                                }
                            });
                            if (checkResponse.ok) {
                                const existingFile = await checkResponse.json();
                                sha = existingFile.sha;
                            }
                        } catch (err) {
                            // File doesn't exist, that's fine
                        }

                        // Upload file
                        const body = {
                            message: `Upload image: ${filename}`,
                            content: base64,
                            branch: BRANCH
                        };
                        if (sha) {
                            body.sha = sha;
                        }

                        const response = await fetch(`${API_BASE}/${path}?t=${Date.now()}`, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Accept': 'application/vnd.github.v3+json',
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(body)
                        });

                        if (!response.ok) {
                            const err = await response.json();
                            throw new Error(err.message || `上传失败: ${response.status}`);
                        }

                        const data = await response.json();
                        resolve({
                            path: `/${data.content.path}`,
                            filename: filename
                        });
                    };
                    reader.onerror = () => reject(new Error('读取文件失败'));
                    reader.readAsDataURL(file);
                } catch (error) {
                    reject(error);
                }
            });
        }

            if (hasValue && !currentValue.startsWith('http')) {

                previewSrc = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${cleanPath}`;
            }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function saveFaqItem(index) {
            const question = document.getElementById('faqQuestion').value.trim();
            const questionAlt = document.getElementById('faqQuestionAlt').value.trim();
            const answer = document.getElementById('faqAnswer').value.trim();
            const order = parseInt(document.getElementById('faqOrder').value) || 0;
            const published = document.getElementById('faqPublished').checked;
            
            if (!question) {
                showToast('请输入问题标题', 'error');
                return;
            }
            
            const faqItem = {
                title: question,
                question: questionAlt || question,
                answer: answer,
                order: order,
                published: published,
                _file: `faq-${Date.now()}`
            };
            
            if (index === -1) {
                // Add new
                faqItemsData.push(faqItem);
            } else {
                // Update existing
                faqItemsData[index] = faqItem;
            }
            
            closeFaqModal();
            
            try {
                const dataToSave = {
                    section_label: faqSectionMeta.section_label,
                    section_title: faqSectionMeta.section_title,
                    items: faqItemsData
                };
                await saveJsonFile(faqItemsPath, dataToSave, '更新FAQ');
                showToast('FAQ保存成功', 'success');
                // Reload the section
                await loadSection('faq-items');
            } catch (error) {
                console.error('保存FAQ失败:', error);
                showToast('保存失败: ' + error.message, 'error');
            }
        }

        async function deleteFaqItem(index) {
            const item = faqItemsData[index];
            if (!confirm(`确定要删除问题"${item.question || item.title || '此项目'}"吗？`)) {
                return;
            }
            
            faqItemsData.splice(index, 1);
            
            try {
                const dataToSave = {
                    section_label: faqSectionMeta.section_label,
                    section_title: faqSectionMeta.section_title,
                    items: faqItemsData
                };
                await saveJsonFile(faqItemsPath, dataToSave, '删除FAQ');
                showToast('FAQ删除成功', 'success');
                // Reload the section
                await loadSection('faq-items');
            } catch (error) {
                console.error('删除FAQ失败:', error);
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        // 更新产品下拉框
        async function updateFeaturedProductDropdown() {
            const type = document.getElementById('featuredType')?.value || 'jewelry';
            const select = document.getElementById('featuredProduct');
            if (!select) return;
            
            try {
                const dir = type === 'watch' ? 'content/watches/products' : 'content/jewelry/products';
                const files = await fetchDirectory(dir);
                const jsonFiles = files.filter(f => f.name.endsWith('.json'));
                
                select.innerHTML = jsonFiles.map(f => `<option value="${f.name.replace('.json','')}">${f.name.replace('.json','')}</option>`).join('');
            } catch(e) {
                select.innerHTML = '<option value="">加载失败</option>';

        }

        // 添加精选产品
        function addFeaturedProduct() {
            const type = document.getElementById('featuredType').value;
            const slug = document.getElementById('featuredProduct').value;
            if (!slug) return;
            
            // 检查是否已存在
            if (featuredProducts.some(p => p.type === type && p.slug === slug)) {
                showToast('该产品已在精选列表中', 'error');
                return;
            }
            
            featuredProducts.push({ type, slug });
            renderFeaturedList();
        }

        // 删除精选产品
        function removeFeaturedProduct(index) {
            featuredProducts.splice(index, 1);
            renderFeaturedList();
        }

        // 上移
        function moveFeaturedUp(index) {
            if (index <= 0) return;
            [featuredProducts[index - 1], featuredProducts[index]] = [featuredProducts[index], featuredProducts[index - 1]];
            renderFeaturedList();
        }

        // 下移
        function moveFeaturedDown(index) {
            if (index >= featuredProducts.length - 1) return;
            [featuredProducts[index], featuredProducts[index + 1]] = [featuredProducts[index + 1], featuredProducts[index]];
            renderFeaturedList();
        }

        // 渲染精选列表
        function renderFeaturedList() {
            const container = document.getElementById('featuredList');
            if (!container) return;
            
            if (featuredProducts.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:20px;">暂无精选产品，请从上方添加</p>';
                return;

            container.innerHTML = featuredProducts.map((fp, i) => `
                <div style="display:flex;align-items:center;gap:12px;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;">
                    <span style="color:var(--text-secondary);font-size:12px;min-width:24px;">${i + 1}</span>

                    <span style="flex:1;font-size:14px;">${fp.slug}</span>
                    <button class="btn-small" onclick="moveFeaturedUp(${i})" ${i === 0 ? 'disabled' : ''} style="padding:4px 8px;">↑</button>
                    <button class="btn-small" onclick="moveFeaturedDown(${i})" ${i === featuredProducts.length - 1 ? 'disabled' : ''} style="padding:4px 8px;">↓</button>
                    <button class="btn-small btn-remove" onclick="removeFeaturedProduct(${i})">删除</button>
                </div>
            `).join('');
        }

                            <input type="color" name="colors.text_secondary" value="${data.colors?.text_secondary || '#8A8A8A'}">
                        </div>
                        <div class="form-group">
                            <label>边框色</label>
                            <input type="color" name="colors.border_color" value="${data.colors?.border_color || '#E8E4DE'}">
                        </div>

                        <div class="section-divider"><h3 class="section-title">Hero 区域</h3></div>
                        <div class="form-group">
                            <label>背景颜色</label>
                            <input type="color" name="hero.bg_color" value="${data.hero?.bg_color || '#000000'}">
                        </div>
                        <div class="form-group">
                            <label>遮罩透明度 (0-1)</label>
                            <input type="number" name="hero.overlay_opacity" value="${data.hero?.overlay_opacity || 0.4}" step="0.1" min="0" max="1">
                        </div>
                        <div class="form-group">
                            <label>文字颜色</label>
                            <input type="color" name="hero.text_color" value="${data.hero?.text_color || '#FFFFFF'}">
                        </div>

                        <div class="section-divider"><h3 class="section-title">WhatsApp 按钮</h3></div>
                        <div class="form-group">
                            <label>WhatsApp 链接</label>
                            <input type="text" name="whatsapp_cta.link" value="${data.whatsapp_cta?.link || ''}">
                        </div>
                        <div class="form-group">
                            <label>按钮文字</label>
                            <input type="text" name="whatsapp_cta.text" value="${data.whatsapp_cta?.text || ''}">
                        </div>
                        <div class="form-group">
                            <label>按钮颜色</label>
                            <input type="color" name="whatsapp_cta.button_color" value="${data.whatsapp_cta?.button_color || '#E2B94D'}">
                        </div>
                        <div class="form-group">
                            <label>文字颜色</label>
                            <input type="color" name="whatsapp_cta.text_color" value="${data.whatsapp_cta?.text_color || '#1A1A1A'}">
                        </div>
                    </div>
                </div>
            `;
        }

        // Save current section
        async function saveCurrentSection() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.classList.add('saving');

            try {
                const sectionInfo = sections[currentSection];

                if (currentSection === 'theme') {
                    // Save JSON
                    const newData = {};
                    document.querySelectorAll('#tab-0 input').forEach(input => {
                        const parts = input.name.split('.');
                        if (parts.length === 2) {
                            if (!newData[parts[0]]) newData[parts[0]] = {};
                            newData[parts[0]][parts[1]] = input.type === 'number' ? parseFloat(input.value) : input.value;
                        }
                    });
                    await saveJsonFile('content/settings/theme.json', newData, '更新主题设置');
                } else if (sectionInfo.loadFiles || sectionInfo.files[0].type === 'faq-directory') {
                    showToast('产品需要使用编辑按钮单独保存。', 'error');
                    return;
                } else if (currentSection === 'order') {
                    // Order section has its own save mechanism with visual step editor
                    showToast('订购步骤使用单独的编辑功能保存。', 'info');
                    return;
                } else {
                    // Save JSON
                    const file = sectionInfo.files[0];
                    const content = sectionData[file.path];
                    const newData = { ...content };

                    // Collect form values
                    const inputs = document.querySelectorAll('#tab-0 input, #tab-0 textarea');
                    
                    // For home section, use brandPromisesData and craftImages directly
                    if (currentSection === 'home') {
                        newData.brand_promises = brandPromisesData;
                        // Remove old format fields
                        delete newData.craft_image_1;
                        delete newData.craft_image_2;
                        delete newData.craft_image_3;
                    }
                    
                    // For contact section, build social_links and contact_items from individual inputs
                    if (currentSection === 'contact') {
                        const socialLinks = [];
                        socialPlatforms.forEach(platform => {
                            const input = document.querySelector(`input[name="social_${platform.type}"]`);
                            if (input && input.value.trim()) {
                                socialLinks.push({
                                    type: platform.type,
                                    url: input.value.trim()
                                });
                            }
                        });
                        newData.social_links = socialLinks;

                        // Build contact_items from individual inputs
                        const contactItems = [];
                        const addressTitle = document.querySelector('input[name="contact_address_title"]');
                        const addressContent = document.querySelector('input[name="contact_address_content"]');
                        const phoneTitle = document.querySelector('input[name="contact_phone_title"]');
                        const phoneContent = document.querySelector('input[name="contact_phone_content"]');
                        const emailTitle = document.querySelector('input[name="contact_email_title"]');
                        const emailContent = document.querySelector('input[name="contact_email_content"]');
                        if (addressTitle && addressContent && (addressTitle.value.trim() || addressContent.value.trim())) {
                            contactItems.push({ type: 'address', icon: 'location', title: addressTitle.value.trim(), content: addressContent.value.trim() });
                        }
                        if (phoneTitle && phoneContent && (phoneTitle.value.trim() || phoneContent.value.trim())) {
                            contactItems.push({ type: 'phone', icon: 'phone', title: phoneTitle.value.trim(), content: phoneContent.value.trim() });
                        }
                        if (emailTitle && emailContent && (emailTitle.value.trim() || emailContent.value.trim())) {
                            contactItems.push({ type: 'email', icon: 'email', title: emailTitle.value.trim(), content: emailContent.value.trim() });
                        }
                        newData.contact_items = contactItems;
                    }
                    
                    inputs.forEach(input => {
                        const name = input.name || input.id;
                        if (!name) return;
                        
                        // Skip social_* and contact_* inputs - handled above for contact section
                        if (name.startsWith('social_') || name.startsWith('contact_')) return;
                        
                        // Handle JSON fields
                        if (['brand_promises', 'story_paragraphs', 'highlights', 'process_steps', 'promises', 
                             'contact_items', 'steps', 'categories'].includes(name)) {
                            try {
                                newData[name] = JSON.parse(input.value);
                            } catch (e) {
                                console.error('JSON 解析错误', name);
                            }
                        } else {
                            newData[name] = input.value;
                        }
                    });

                    // Determine JSON file path based on section
                    let jsonPath = file.path;
                    if (file.type === 'faq-json') {
                        jsonPath = 'content/faq/faq.json';
                    }
                    
                    await saveJsonFile(jsonPath, newData, `更新 ${sectionInfo.title}`);
                }

                showToast('保存成功！Cloudflare Pages 将很快重新构建。');
            } catch (error) {
                console.error('保存错误:', error);
                showToast('保存失败: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.classList.remove('saving');
            }
        }

        // Initialize
        if (checkAuth()) {
            loadSection('home');
        }
    </script>
</body>
</html>
