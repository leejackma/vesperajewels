<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - Vespera Jewels Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #C5A467;
            --gold-dark: #B8924A;
            --bg: #FAFAF8;
            --white: #FFFFFF;
            --dark: #0F0F0F;
            --text: #1A1A1A;
            --text-secondary: #8A8A8A;
            --border: #E8E4DE;
            --sidebar-width: 280px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--gold);
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .user-info {
            padding: 15px 25px;
            background: var(--bg);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 600;
            font-size: 14px;
        }

        .user-name {
            flex: 1;
            font-weight: 500;
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            color: #EF4444;
            background: #FEE2E2;
        }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 15px 0;
        }

        .nav-section {
            margin-bottom: 5px;
        }

        .nav-section-title {
            padding: 10px 25px 5px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 25px;
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            gap: 12px;
        }

        .nav-item:hover {
            background: var(--bg);
            color: var(--gold);
        }

        .nav-item.active {
            background: rgba(197, 164, 103, 0.08);
            color: var(--gold);
            border-left-color: var(--gold);
            font-weight: 500;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
        }

        .sidebar-footer {
            padding: 20px 25px;
            border-top: 1px solid var(--border);
        }

        .save-btn {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .save-btn:hover:not(:disabled) {
            background: var(--gold-dark);
        }

        .save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .save-btn.saving {
            position: relative;
            color: transparent;
        }

        .save-btn.saving::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid var(--white);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            padding: 30px;
        }

        .content-header {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .content-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--text);
        }

        .content-header p {
            color: var(--text-secondary);
            margin-top: 5px;
            font-size: 14px;
        }

        /* Editor Panel */
        .editor-panel {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .panel-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .panel-tab {
            padding: 15px 25px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .panel-tab:hover {
            color: var(--text);
        }

        .panel-tab.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
            background: var(--white);
        }

        .panel-content {
            padding: 30px;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* Form Styles */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
        }

        label .hint {
            font-weight: 400;
            color: var(--text-secondary);
            font-size: 12px;
        }

        input[type="text"],
        input[type="number"],
        input[type="url"],
        input[type="color"],
        textarea,
        select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            transition: all 0.2s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(197, 164, 103, 0.1);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        input[type="color"] {
            height: 44px;
            padding: 4px;
            cursor: pointer;
        }

        /* List Editor */
        .list-editor {
            background: var(--bg);
            border-radius: 8px;
            padding: 15px;
        }

        .list-item {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .list-item:last-child {
            margin-bottom: 0;
        }

        .list-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .list-item-title {
            font-weight: 500;
            font-size: 14px;
        }

        .list-item-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add {
            background: var(--gold);
            color: var(--white);
        }

        .btn-add:hover {
            background: var(--gold-dark);
        }

        .btn-remove {
            background: #FEE2E2;
            color: #991B1B;
        }

        .btn-remove:hover {
            background: #FECACA;
        }

        .btn-edit {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-edit:hover {
            background: var(--border);
        }

        .nested-fields {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .nested-fields .form-group {
            margin-bottom: 0;
        }

        /* Image Preview */
        .image-preview {
            margin-top: 10px;
            max-width: 200px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .image-preview img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #A7F3D0;
        }

        .toast.error {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FECACA;
        }

        .toast-icon {
            width: 20px;
            height: 20px;
        }

        /* Section Divider */
        .section-divider {
            grid-column: 1 / -1;
            padding: 20px 0;
            margin: 10px 0;
            border-top: 1px solid var(--border);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: var(--gold);
            margin-bottom: 15px;
        }

        /* Mobile Menu Toggle */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 200;
            width: 44px;
            height: 44px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        .mobile-toggle svg {
            width: 20px;
            height: 20px;
            stroke: var(--text);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 99;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            stroke: var(--border);
            margin-bottom: 20px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .mobile-toggle {
                display: flex;
            }

            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .overlay.open {
                display: block;
            }

            .main-content {
                margin-left: 0;
                padding: 80px 20px 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading State */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(250, 250, 248, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }

        .loading-spinner {
            text-align: center;
        }

        .loading-spinner svg {
            width: 50px;
            height: 50px;
            stroke: var(--gold);
            animation: rotate 2s linear infinite;
        }

        .loading-spinner p {
            margin-top: 15px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        /* Image Upload Component */
        .image-upload-wrapper {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
        }

        .image-upload-preview {
            position: relative;
            max-width: 200px;
            margin-bottom: 12px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .image-upload-preview img {
            width: 100%;
            height: auto;
            display: block;
        }

        .image-upload-preview .remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .image-upload-preview .remove-btn:hover {
            background: rgba(239, 68, 68, 0.8);
        }

        .image-size-hint {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .image-size-hint svg {
            width: 14px;
            height: 14px;
        }

        .image-upload-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            background: var(--gold);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-btn:hover:not(:disabled) {
            background: var(--gold-dark);
        }

        .upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .upload-btn svg {
            width: 18px;
            height: 18px;
        }

        .url-toggle {
            font-size: 12px;
            color: var(--text-secondary);
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px 0;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .url-toggle:hover {
            color: var(--gold);
        }

        .url-toggle svg {
            width: 14px;
            height: 14px;
            transition: transform 0.2s;
        }

        .url-toggle.expanded svg {
            transform: rotate(180deg);
        }

        .url-input-wrapper {
            display: none;
            margin-top: 8px;
        }

        .url-input-wrapper.show {
            display: block;
        }

        .url-input-wrapper input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
        }

        .url-input-wrapper input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .upload-progress {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(197, 164, 103, 0.1);
            border-radius: 6px;
            font-size: 12px;
            color: var(--gold);
        }

        .upload-progress.show {
            display: flex;
        }

        .upload-progress .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--gold);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Hidden file input */
        .file-input-hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Mobile Toggle -->
    <button class="mobile-toggle" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <!-- Overlay -->
    <div class="overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>VESPERA</h1>
            <p>Jewels Admin</p>
        </div>

        <div class="user-info">
            <div class="user-avatar" id="userAvatar">?</div>
            <span class="user-name" id="userName">加载中...</span>
            <button class="logout-btn" onclick="logout()" title="退出登录">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
        </div>

        <nav class="nav-menu">
            <div class="nav-section">
                <div class="nav-section-title">内容管理</div>
                <div class="nav-item active" data-section="home" onclick="switchSection('home')">
                    <span class="nav-icon">
                        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    </span>
                    Home

                <div class="nav-item" data-section="about" onclick="switchSection('about')">

                    </span>
                    About Us
                </div>
                <div class="nav-item" data-section="contact" onclick="switchSection('contact')">
                    <span class="nav-icon">
                        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                    </span>
                    Contact
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">产品管理</div>

                    </span>
                    Jewelry Settings
                </div>
                <div class="nav-item" data-section="jewelry-products" onclick="switchSection('jewelry-products')">

                    </span>
                    Jewelry Products
                </div>
                <div class="nav-item" data-section="watches" onclick="switchSection('watches')">

                    Watch Settings
                </div>
                <div class="nav-item" data-section="watch-products" onclick="switchSection('watch-products')">

                        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    </span>
                    Watch Products

            </div>

            <div class="nav-section">
                <div class="nav-section-title">信息页面</div>
                <div class="nav-item" data-section="faq" onclick="switchSection('faq')">
                    <span class="nav-icon">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>

                    FAQ Settings
                </div>

                    </span>
                    FAQ Items
                </div>
                <div class="nav-item" data-section="process" onclick="switchSection('process')">
                    <span class="nav-icon">
                        <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
                    </span>
                    Process Steps

        function getImageConfig(fieldName, section) {
            // Check for specific section+field combinations
            if (section === 'home' && fieldName === 'hero_image') {
                return { width: 1920, height: 1080, desc: '横幅背景图' };
            }
            if (section === 'about' && fieldName === 'story_image') {

            if (section === 'process' && fieldName === 'image') {

                return { width: 800, height: 600, desc: '案例图' };

            if ((section === 'jewelry-products' || section === 'watch-products') && fieldName === 'image') {
                return { width: 600, height: 600, desc: '产品图片' };

            // Fallback
            if (imageConfig[fieldName]) {
                return imageConfig[fieldName];
            }
            return { width: 800, height: 600, desc: '通用图片' };

        // Generate unique filename
        function generateImageFilename(section, fieldName, extension) {
            const timestamp = Date.now();
            const cleanSection = section.replace(/-/g, '_');
            const cleanField = fieldName.replace(/\[.*\]/, '').replace(/[^a-zA-Z0-9]/g, '_');
            return `${cleanSection}_${cleanField}_${timestamp}.${extension}`;
        }

        // Upload image to GitHub
        async function uploadImageToGitHub(file, section, fieldName) {
            return new Promise(async (resolve, reject) => {
                try {
                    // Read file as base64
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const base64 = e.target.result.split(',')[1];
                        const extension = file.name.split('.').pop().toLowerCase();
                        const filename = generateImageFilename(section, fieldName, extension);
                        const path = `assets/uploads/${filename}`;

                        // Check if file exists and get sha
                        let sha = null;
                        try {
                            const checkResponse = await fetch(`${API_BASE}/${path}`, {
                                headers: {
                                    'Authorization': `Bearer ${token}`,
                                    'Accept': 'application/vnd.github.v3+json'
                                }
                            });
                            if (checkResponse.ok) {
                                const existingFile = await checkResponse.json();
                                sha = existingFile.sha;
                            }
                        } catch (err) {
                            // File doesn't exist, that's fine
                        }

                        // Upload file
                        const body = {
                            message: `Upload image: ${filename}`,
                            content: base64,
                            branch: BRANCH
                        };
                        if (sha) {
                            body.sha = sha;
                        }

                        const response = await fetch(`${API_BASE}/${path}`, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Accept': 'application/vnd.github.v3+json',
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(body)
                        });

                        if (!response.ok) {
                            const err = await response.json();
                            throw new Error(err.message || `上传失败: ${response.status}`);
                        }

                        const data = await response.json();
                        resolve({
                            path: `/${data.content.path}`,
                            filename: filename
                        });
                    };
                    reader.onerror = () => reject(new Error('读取文件失败'));
                    reader.readAsDataURL(file);
                } catch (error) {
                    reject(error);
                }
            });
        }

        // GitHub API helpers
        async function fetchFile(path) {
            const response = await fetch(`${API_BASE}/${path}`, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (!response.ok) {
                if (response.status === 404) return null;
                throw new Error(`API 错误: ${response.status}`);
            }

            const data = await response.json();
            fileSha[path] = data.sha;
            
            if (data.encoding === 'base64') {
                return JSON.parse(atob(data.content));
            }
            return data;
        }

        async function fetchMarkdownFile(path) {
            const response = await fetch(`${API_BASE}/${path}`, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (!response.ok) {
                if (response.status === 404) return null;
                throw new Error(`API 错误: ${response.status}`);
            }

            const data = await response.json();
            fileSha[path] = data.sha;
            
            if (data.encoding === 'base64') {
                const content = atob(data.content);
                const frontmatter = parseFrontmatter(content);
                return frontmatter;
            }
            return { data: {} };
        }

        function parseFrontmatter(content) {
            const match = content.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
            if (!match) return { data: {}, body: content };

            const yamlStr = match[1];
            const body = match[2] || '';
            const data = {};

            // Simple YAML parser for our format
            const lines = yamlStr.split('\n');
            let currentKey = null;
            let inArray = false;
            let arrayItems = [];
            let arrayKey = null;

            for (const line of lines) {
                if (line.match(/^(\w+):\s*$/)) {
                    if (inArray && arrayKey) {
                        data[arrayKey] = arrayItems;
                        arrayItems = [];
                        inArray = false;
                        arrayKey = null;
                    }
                    currentKey = line.match(/^(\w+):\s*$/)[1];
                    data[currentKey] = '';
                } else if (line.match(/^\s+-\s+(.+)/) && inArray) {
                    arrayItems.push(extractValue(line.match(/^\s+-\s+(.+)/)[1]));
                } else if (line.match(/^(\w+):\s*$/)) {
                    if (inArray && arrayKey) {
                        data[arrayKey] = arrayItems;
                        arrayItems = [];
                    }
                    currentKey = line.match(/^(\w+):\s*$/)[1];
                    data[currentKey] = '';
                } else if (line.match(/^\s+(\w+):\s*$/)) {
                    if (inArray && arrayKey) {
                        data[arrayKey] = arrayItems;
                        arrayItems = [];
                    }
                    inArray = false;
                    arrayKey = line.match(/^\s+(\w+):\s*$/)[1];
                    data[arrayKey] = '';
                } else if (line.match(/^\s+-\s*$/)) {
                    if (currentKey) {
                        inArray = true;
                        arrayKey = currentKey;
                        arrayItems = [];
                    }
                } else if (line.match(/^(\w+):\s*(.+)/)) {
                    const [, key, value] = line.match(/^(\w+):\s*(.+)/);
                    if (inArray && arrayKey) {
                        data[arrayKey] = arrayItems;
                        arrayItems = [];
                        inArray = false;
                        arrayKey = null;
                    }
                    data[key] = extractValue(value);
                }
            }

            if (inArray && arrayKey) {
                data[arrayKey] = arrayItems;
            }

            return { data, body };
        }

        function extractValue(str) {
            str = str.trim();
            if ((str.startsWith('"') && str.endsWith('"')) || 
                (str.startsWith("'") && str.endsWith("'"))) {
                return str.slice(1, -1);
            }
            return str;
        }

        async function fetchDirectory(path) {
            const response = await fetch(`${API_BASE}/${path}`, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (!response.ok) {
                if (response.status === 404) return [];
                throw new Error(`API 错误: ${response.status}`);
            }

            return response.json();
        }

        async function saveFile(path, content, message) {
            const encoded = btoa(unescape(encodeURIComponent(content)));
            
            const body = {
                message: message || `更新 ${path}`,
                content: encoded,
                branch: BRANCH
            };

            if (fileSha[path]) {
                body.sha = fileSha[path];
            }

            const response = await fetch(`${API_BASE}/${path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.message || `API 错误: ${response.status}`);
            }

            const data = await response.json();
            fileSha[path] = data.content.sha;
            return data;
        }

        async function saveJsonFile(path, data, message) {
            return saveFile(path, JSON.stringify(data, null, 2), message);
        }

        async function saveMarkdownFile(path, frontmatter, body, message) {
            let content = '---\n';
            for (const [key, value] of Object.entries(frontmatter)) {
                content += formatYamlValue(key, value);
            }
            content += '---\n';
            if (body) {
                content += '\n' + body;
            }
            return saveFile(path, content, message);
        }

        function formatYamlValue(key, value, indent = '') {
            if (Array.isArray(value)) {
                if (value.length === 0) return `${indent}${key}: []\n`;
                let str = `${indent}${key}:\n`;
                for (const item of value) {
                    if (typeof item === 'object' && item !== null) {
                        str += `${indent}  -\n`;
                        for (const [k, v] of Object.entries(item)) {
                            str += `${indent}    ${k}: "${escapeYaml(v)}"\n`;
                        }
                    } else {
                        str += `${indent}  - "${escapeYaml(item)}"\n`;
                    }
                }
                return str;
            } else if (typeof value === 'object' && value !== null) {
                let str = `${indent}${key}:\n`;
                for (const [k, v] of Object.entries(value)) {
                    str += `${indent}  ${k}: "${escapeYaml(v)}"\n`;
                }
                return str;
            } else {
                return `${indent}${key}: "${escapeYaml(value)}"\n`;
            }
        }

        function escapeYaml(value) {
            if (value === null || value === undefined) return '';
            return String(value).replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n');
        }

            try {
                sectionData = {};
                fileSha = {};

                if (sectionInfo.loadFiles) {
                    // Load directory listing
                    const dirPath = sectionInfo.files[0].path;
                    const files = await fetchDirectory(dirPath);
                    const filteredFiles = sectionInfo.filter 
                        ? files.filter(sectionInfo.filter) 
                        : files.filter(f => f.type === 'file');

                    html += `<div class="form-group full-width"><label>图片</label>`;

                        html += createImageUploadComponent(`image_${i}`, img, 'partner', 'images');
                    });

                } else {
                    html += createImageUploadComponent('image_0', '', 'partner', 'images');
                }

                // Jewelry/Watch product
                html += createFormField('名称', 'name', data.name || '');

                html += createFormField('价格', 'price', data.price || '');

                        <label>已发布</label>

                            <option value="true" ${data.published !== false ? 'selected' : ''}>是</option>
                            <option value="false" ${data.published === false ? 'selected' : ''}>否</option>

        function createFormField(label, name, value, type = 'text', options = null) {
            if (type === 'textarea') {
                return `
                    <div class="form-group full-width">
                        <label>${label}</label>
                        <textarea name="${name}">${value || ''}</textarea>
                    </div>
                `;
            } else if (type === 'select' && options) {
                const opts = options.map(opt => `<option value="${opt}" ${value === opt ? 'selected' : ''}>${opt}</option>`).join('');
                return `
                    <div class="form-group">
                        <label>${label}</label>
                        <select name="${name}">${opts}</select>
                    </div>
                `;
            } else if (type === 'number') {
                return `
                    <div class="form-group">
                        <label>${label}</label>
                        <input type="number" name="${name}" value="${value || 0}">
                    </div>
                `;
            }
            return `
                <div class="form-group">
                    <label>${label}</label>
                    <input type="text" name="${name}" value="${value || ''}">
                </div>
            `;
        }

        async function saveProduct(path) {
            const container = document.getElementById('editFormContainer');
            const formData = new FormData();
            
            container.querySelectorAll('input, textarea, select').forEach(el => {
                formData.append(el.name, el.value);
            });

            // Build frontmatter
            const isFaq = path.includes('/faq/');
            const isProcess = path.includes('/process/');
            const isPartner = path.includes('/partner-cases/');

            let frontmatter = { title: formData.get('name') || formData.get('title') || formData.get('question') || '' };

            if (isFaq) {
                frontmatter = {
                    title: formData.get('question'),
                    question: formData.get('question'),
                    answer: formData.get('answer'),
                    order: parseInt(formData.get('order')) || 0
                };
            } else if (isProcess) {
                frontmatter = {
                    title: formData.get('title'),
                    image: formData.get('image'),
                    order: parseInt(formData.get('order')) || 1,
                    published: true
                };
            } else if (isPartner) {
                const images = [];
                let i = 0;
                while (formData.has(`image_${i}`)) {
                    const img = formData.get(`image_${i}`);
                    if (img) images.push(img);
                    i++;
                }
                frontmatter = {
                    title: formData.get('title'),
                    description: formData.get('description'),
                    images: images.length ? images : [],
                    order: parseInt(formData.get('order')) || 1,
                    published: true
                };
            } else {
                frontmatter = {
                    title: formData.get('name'),
                    name: formData.get('name'),
                    category: formData.get('category'),
                    price: formData.get('price'),
                    description: formData.get('description'),
                    image: formData.get('image'),
                    badge: formData.get('badge'),
                    featured: formData.get('featured') === 'true',
                    published: formData.get('published') === 'true'
                };
            }

            const body = sectionData[path]?.body || '';
            
            try {
                await saveMarkdownFile(path, frontmatter, body, `更新 ${sections[currentSection].title} - ${frontmatter.title || path.split('/').pop()}`);
                showToast('保存成功！Cloudflare Pages 将很快重新构建。');
                document.querySelector('.modal-overlay').remove();
                await loadSection(currentSection);
            } catch (error) {
                showToast('保存失败: ' + error.message, 'error');
            }
        }

        async function deleteProduct(path) {
            if (!confirm('确定要删除此项目吗？此操作无法撤销。')) return;

            try {
                const response = await fetch(`${API_BASE}/${path}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `删除 ${path}`,
                        sha: fileSha[path],
                        branch: BRANCH
                    })
                });

                if (!response.ok) {
                    throw new Error('删除失败');
                }

                showToast('删除成功！');
                await loadSection(currentSection);
            } catch (error) {
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        // Save current section
        async function saveCurrentSection() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.classList.add('saving');

            try {
                const sectionInfo = sections[currentSection];

                if (currentSection === 'theme') {
                    // Save JSON
                    const newData = {};
                    document.querySelectorAll('#tab-0 input').forEach(input => {
                        const parts = input.name.split('.');
                        if (parts.length === 2) {
                            if (!newData[parts[0]]) newData[parts[0]] = {};
                            newData[parts[0]][parts[1]] = input.type === 'number' ? parseFloat(input.value) : input.value;
                        }
                    });
                    await saveJsonFile('content/settings/theme.json', newData, '更新主题设置');
                } else if (sectionInfo.loadFiles) {
                    showToast('产品需要使用编辑按钮单独保存。', 'error');
                    return;
                } else {
                    // Save markdown
                    const file = sectionInfo.files[0];
                    const content = sectionData[file.path];
                    const newData = { ...content.data };

                    // Collect form values
                    const inputs = document.querySelectorAll('#tab-0 input, #tab-0 textarea');
                    
                    // For contact section, build social_links and contact_items from individual inputs
                    if (currentSection === 'contact') {
                        const socialLinks = [];
                        socialPlatforms.forEach(platform => {
                            const input = document.querySelector(`input[name="social_${platform.type}"]`);
                            if (input && input.value.trim()) {
                                socialLinks.push({
                                    type: platform.type,
                                    url: input.value.trim()
                                });
                            }
                        });
                        newData.social_links = socialLinks;

                        // Build contact_items from individual inputs
                        const contactItems = [];
                        const addressTitle = document.querySelector('input[name="contact_address_title"]');
                        const addressContent = document.querySelector('input[name="contact_address_content"]');
                        const phoneTitle = document.querySelector('input[name="contact_phone_title"]');
                        const phoneContent = document.querySelector('input[name="contact_phone_content"]');
                        const emailTitle = document.querySelector('input[name="contact_email_title"]');
                        const emailContent = document.querySelector('input[name="contact_email_content"]');
                        if (addressTitle && addressContent && (addressTitle.value.trim() || addressContent.value.trim())) {
                            contactItems.push({ type: 'address', icon: 'location', title: addressTitle.value.trim(), content: addressContent.value.trim() });
                        }
                        if (phoneTitle && phoneContent && (phoneTitle.value.trim() || phoneContent.value.trim())) {
                            contactItems.push({ type: 'phone', icon: 'phone', title: phoneTitle.value.trim(), content: phoneContent.value.trim() });
                        }
                        if (emailTitle && emailContent && (emailTitle.value.trim() || emailContent.value.trim())) {
                            contactItems.push({ type: 'email', icon: 'email', title: emailTitle.value.trim(), content: emailContent.value.trim() });
                        }
                        newData.contact_items = contactItems;
                    }
                    
                    inputs.forEach(input => {
                        const name = input.name || input.id;
                        if (!name) return;
                        
                        // Skip social_* and contact_* inputs - handled above for contact section
                        if (name.startsWith('social_') || name.startsWith('contact_')) return;
                        
                        // Handle JSON fields (but skip social_links which is handled above)
                        if (['brand_promises', 'story_paragraphs', 'highlights', 'process_steps', 'promises', 
                             'contact_items', 'steps', 'categories'].includes(name)) {
                            try {
                                newData[name] = JSON.parse(input.value);
                            } catch (e) {
                                console.error('JSON 解析错误', name);
                            }
                        } else {
                            newData[name] = input.value;
                        }
                    });

                    await saveMarkdownFile(file.path, newData, content.body, `更新 ${sectionInfo.title}`);
                }

                showToast('保存成功！Cloudflare Pages 将很快重新构建。');
            } catch (error) {
                console.error('保存错误:', error);
                showToast('保存失败: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.classList.remove('saving');
            }
        }
