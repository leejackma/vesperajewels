<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - Vespera Jewels Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #C5A467;
            --gold-dark: #B8924A;
            --bg: #FAFAF8;
            --white: #FFFFFF;
            --dark: #0F0F0F;
            --text: #1A1A1A;
            --text-secondary: #8A8A8A;
            --border: #E8E4DE;
            --sidebar-width: 280px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--gold);
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .user-info {
            padding: 15px 25px;
            background: var(--bg);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 600;
            font-size: 14px;
        }

        .user-name {
            flex: 1;
            font-weight: 500;
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            color: #EF4444;
            background: #FEE2E2;
        }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 15px 0;
        }

        .nav-section {
            margin-bottom: 5px;
        }

        .nav-section-title {
            padding: 10px 25px 5px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 25px;
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            gap: 12px;
        }

        .nav-item:hover {
            background: var(--bg);
            color: var(--gold);
        }

        .nav-item.active {
            background: rgba(197, 164, 103, 0.08);
            color: var(--gold);
            border-left-color: var(--gold);
            font-weight: 500;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
        }

        .sidebar-footer {
            padding: 20px 25px;
            border-top: 1px solid var(--border);
        }

        .save-btn {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .save-btn:hover:not(:disabled) {
            background: var(--gold-dark);
        }

        .save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .save-btn.saving {
            position: relative;
            color: transparent;
        }

        .save-btn.saving::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid var(--white);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            padding: 30px;
        }

        .content-header {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .content-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--text);
        }

        .content-header p {
            color: var(--text-secondary);
            margin-top: 5px;
            font-size: 14px;
        }

        /* Editor Panel */
        .editor-panel {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .panel-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .panel-tab {
            padding: 15px 25px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .panel-tab:hover {
            color: var(--text);
        }

        .panel-tab.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
            background: var(--white);
        }

        .panel-content {
            padding: 30px;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* Form Styles */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
        }

        label .hint {
            font-weight: 400;
            color: var(--text-secondary);
            font-size: 12px;
        }

        input[type="text"],
        input[type="number"],
        input[type="url"],
        input[type="color"],
        textarea,
        select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            transition: all 0.2s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(197, 164, 103, 0.1);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        input[type="color"] {
            height: 44px;
            padding: 4px;
            cursor: pointer;
        }

        /* List Editor */
        .list-editor {
            background: var(--bg);
            border-radius: 8px;
            padding: 15px;
        }

        .list-item {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .list-item:last-child {
            margin-bottom: 0;
        }

        .list-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .list-item-title {
            font-weight: 500;
            font-size: 14px;
        }

        .list-item-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add {
            background: var(--gold);
            color: var(--white);
        }

        .btn-add:hover {
            background: var(--gold-dark);
        }

        .btn-remove {
            background: #FEE2E2;
            color: #991B1B;
        }

        .btn-remove:hover {
            background: #FECACA;
        }

        .btn-edit {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-edit:hover {
            background: var(--border);
        }

        .nested-fields {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .nested-fields .form-group {
            margin-bottom: 0;
        }

        /* Image Preview */
        .image-preview {
            margin-top: 10px;
            max-width: 200px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .image-preview img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #A7F3D0;
        }

        .toast.error {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FECACA;
        }

        .toast-icon {
            width: 20px;
            height: 20px;
        }

        /* Section Divider */
        .section-divider {
            grid-column: 1 / -1;
            padding: 20px 0;
            margin: 10px 0;
            border-top: 1px solid var(--border);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: var(--gold);
            margin-bottom: 15px;
        }

        /* Mobile Menu Toggle */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 200;
            width: 44px;
            height: 44px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        .mobile-toggle svg {
            width: 20px;
            height: 20px;
            stroke: var(--text);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 99;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            stroke: var(--border);
            margin-bottom: 20px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .mobile-toggle {
                display: flex;
            }

            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .overlay.open {
                display: block;
            }

            .main-content {
                margin-left: 0;
                padding: 80px 20px 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading State */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(250, 250, 248, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }

        .loading-spinner {
            text-align: center;
        }

        .loading-spinner svg {
            width: 50px;
            height: 50px;
            stroke: var(--gold);
            animation: rotate 2s linear infinite;
        }

        .loading-spinner p {
            margin-top: 15px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        /* Image Upload Component */
        .image-upload-wrapper {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
        }

        .image-upload-preview {
            position: relative;
            max-width: 200px;
            margin-bottom: 12px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .image-upload-preview img {
            width: 100%;
            height: auto;
            display: block;
        }

        .image-upload-preview .remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .image-upload-preview .remove-btn:hover {
            background: rgba(239, 68, 68, 0.8);
        }

        .image-size-hint {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .image-size-hint svg {
            width: 14px;
            height: 14px;
        }

        .image-upload-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            background: var(--gold);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-btn:hover:not(:disabled) {
            background: var(--gold-dark);
        }

        .upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .upload-btn svg {
            width: 18px;
            height: 18px;
        }

        .url-toggle {
            font-size: 12px;
            color: var(--text-secondary);
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px 0;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .url-toggle:hover {
            color: var(--gold);
        }

        .url-toggle svg {
            width: 14px;
            height: 14px;
            transition: transform 0.2s;
        }

        .url-toggle.expanded svg {
            transform: rotate(180deg);
        }

        .url-input-wrapper {
            display: none;
            margin-top: 8px;
        }

        .url-input-wrapper.show {
            display: block;
        }

        .url-input-wrapper input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
        }

        .url-input-wrapper input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .upload-progress {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(197, 164, 103, 0.1);
            border-radius: 6px;
            font-size: 12px;
            color: var(--gold);
        }

        .upload-progress.show {
            display: flex;
        }

        .upload-progress .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--gold);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Hidden file input */
        .file-input-hidden {
            display: none;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding: 10px 0;
        }

        .product-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        .product-card-image {
            position: relative;
            width: 100%;
            height: 200px;
            background: var(--bg);
            overflow: hidden;
        }

        .product-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-card-image .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: var(--text-secondary);
        }

        .product-card-image .placeholder svg {
            width: 48px;
            height: 48px;
            stroke: var(--border);
        }

        .product-card-body {
            padding: 16px;
        }

        .product-card-category {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--gold);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .product-card-name {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .product-card-price {
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 12px;
        }

        .product-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .product-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .product-status.published {
            background: #D1FAE5;
            color: #065F46;
        }

        .product-status.draft {
            background: #FEF3C7;
            color: #92400E;
        }

        .product-card-actions {
            display: flex;
            gap: 8px;
        }

        .product-card-actions button {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .product-card-actions .btn-edit {
            background: var(--gold);
            color: var(--white);
        }

        .product-card-actions .btn-edit:hover {
            background: var(--gold-dark);
        }

        .product-card-actions .btn-delete {
            background: #FEE2E2;
            color: #991B1B;
        }

        .product-card-actions .btn-delete:hover {
            background: #FECACA;
        }

        /* Add Product Button */
        .add-product-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: var(--gold);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-product-btn:hover {
            background: var(--gold-dark);
        }

        .add-product-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Product Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .product-modal {
            background: var(--white);
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            max-height: calc(100vh - 80px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .product-modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg);
        }

        .product-modal-header h3 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--gold);
        }

        .product-modal-close {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            color: var(--text-secondary);
            border-radius: 6px;
            transition: all 0.2s;
        }

        .product-modal-close:hover {
            background: var(--border);
            color: var(--text);
        }

        .product-modal-body {
            padding: 25px;
            overflow-y: auto;
            flex: 1;
        }

        .product-modal-footer {
            padding: 20px 25px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: var(--bg);
        }

        .product-modal-footer button {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .product-modal-footer .btn-cancel {
            background: var(--white);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .product-modal-footer .btn-cancel:hover {
            background: var(--bg);
        }

        .product-modal-footer .btn-save {
            background: var(--gold);
            border: none;
            color: var(--white);
        }

        .product-modal-footer .btn-save:hover {
            background: var(--gold-dark);
        }

        /* Category Manager Styles */
        .category-manager-modal {
            background: var(--white);
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            max-height: calc(100vh - 80px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

            height: 26px;

            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 26px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {
            background-color: var(--gold);
        }

            transform: translateX(22px);
        }

        .toggle-label {

    <script>
        // Config
        const REPO_OWNER = 'leejackma';
        const REPO_NAME = 'vesperajewels';
        const BRANCH = 'main';
        const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;

        // State
        let currentSection = 'home';
        let token = localStorage.getItem('gh_pat');
        let user = null;
        let sectionData = {};
        let fileSha = {};

        // Check auth
        function checkAuth() {
            if (!token) {
                window.location.href = 'login.html';
                return false;
            }
            try {
                user = JSON.parse(localStorage.getItem('gh_user'));
                if (user) {
                    document.getElementById('userName').textContent = user.login;
                    document.getElementById('userAvatar').textContent = user.login.charAt(0).toUpperCase();
                }
            } catch (e) {
                window.location.href = 'login.html';
            }
            return true;
        }

        function logout() {
            localStorage.removeItem('gh_pat');
            localStorage.removeItem('gh_user');
            window.location.href = 'login.html';
        }

        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('open');
            document.querySelector('.overlay').classList.toggle('open');
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type}`;
            toast.querySelector('.toast-message').textContent = message;
            toast.querySelector('.toast-icon').innerHTML = type === 'success' 
                ? '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>'
                : '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Image upload configuration - recommended sizes for each field
        const imageConfig = {
            'hero_image': { width: 1920, height: 1080, desc: '横幅背景图' },
            'story_image': { width: 800, height: 600, desc: '故事配图' },
            'image': { width: 600, height: 600, desc: '产品图片' },
            'images': { width: 800, height: 600, desc: '案例图片' }
        };

        function getImageConfig(fieldName, section) {
            // Check for specific section+field combinations
            if (section === 'home' && fieldName === 'hero_image') {
                return { width: 1920, height: 1080, desc: '横幅背景图' };
            }
            if (section === 'about' && fieldName === 'story_image') {
                return { width: 800, height: 600, desc: '故事配图' };
            }
            if (section === 'process' && fieldName === 'image') {
                return { width: 600, height: 400, desc: '步骤图' };
            }
            if (section === 'partner' && fieldName === 'images') {
                return { width: 800, height: 600, desc: '案例图' };
            }
            if ((section === 'jewelry-products' || section === 'watch-products') && fieldName === 'image') {
                return { width: 600, height: 600, desc: '产品图片' };
            }
            // Fallback
            if (imageConfig[fieldName]) {
                return imageConfig[fieldName];
            }
            return { width: 800, height: 600, desc: '通用图片' };
        }

        // Generate unique filename
        function generateImageFilename(section, fieldName, extension) {
            const timestamp = Date.now();
            const cleanSection = section.replace(/-/g, '_');
            const cleanField = fieldName.replace(/\[.*\]/, '').replace(/[^a-zA-Z0-9]/g, '_');
            return `${cleanSection}_${cleanField}_${timestamp}.${extension}`;
        }

        // Upload image to GitHub
        async function uploadImageToGitHub(file, section, fieldName) {
            return new Promise(async (resolve, reject) => {
                try {
                    // Read file as base64
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const base64 = e.target.result.split(',')[1];
                        const extension = file.name.split('.').pop().toLowerCase();
                        const filename = generateImageFilename(section, fieldName, extension);
                        const path = `assets/uploads/${filename}`;

                        // Check if file exists and get sha
                        let sha = null;
                        try {
                            const checkResponse = await fetch(`${API_BASE}/${path}?t=${Date.now()}`, {
                                headers: {
                                    'Authorization': `Bearer ${token}`,
                                    'Accept': 'application/vnd.github.v3+json'
                                }
                            });
                            if (checkResponse.ok) {
                                const existingFile = await checkResponse.json();
                                sha = existingFile.sha;
                            }
                        } catch (err) {
                            // File doesn't exist, that's fine
                        }

                        // Upload file
                        const body = {
                            message: `Upload image: ${filename}`,
                            content: base64,
                            branch: BRANCH
                        };
                        if (sha) {
                            body.sha = sha;
                        }

                        const response = await fetch(`${API_BASE}/${path}?t=${Date.now()}`, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Accept': 'application/vnd.github.v3+json',
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(body)
                        });

                        if (!response.ok) {
                            const err = await response.json();
                            throw new Error(err.message || `上传失败: ${response.status}`);
                        }

                        const data = await response.json();
                        resolve({
                            path: `/${data.content.path}`,
                            filename: filename
                        });
                    };
                    reader.onerror = () => reject(new Error('读取文件失败'));
                    reader.readAsDataURL(file);
                } catch (error) {
                    reject(error);
                }
            });
        }

        // Create image upload component
        function createImageUploadComponent(name, currentValue, section, fieldName) {
            const config = getImageConfig(fieldName, section);
            const id = `img-${name}-${Date.now()}`;
            const hasValue = currentValue && currentValue.trim() !== '';
            const isExternalUrl = hasValue && (currentValue.startsWith('http://') || currentValue.startsWith('https://')) && !currentValue.includes('/assets/uploads/');
            // Build preview src: use GitHub raw URL for uploaded images to bypass Cloudflare WAF
            let previewSrc = currentValue || '';
            if (hasValue && !currentValue.startsWith('http')) {
                const cleanPath = currentValue.startsWith('/') ? currentValue.substring(1) : currentValue;
                previewSrc = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${cleanPath}`;

        // GitHub API helpers
        async function fetchJsonFile(path) {
            const cacheBuster = `?t=${Date.now()}`;
            const response = await fetch(`${API_BASE}/${path}${cacheBuster}`, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (!response.ok) {
                if (response.status === 404) return null;
                throw new Error(`API 错误: ${response.status}`);
            }

            const data = await response.json();
            fileSha[path] = data.sha;
            
            if (data.encoding === 'base64') {
                return JSON.parse(atob(data.content));
            }
            return data;
        }

        async function fetchFile(path) {
            return fetchJsonFile(path);
        }

        async function fetchMarkdownFile(path) {
            const cacheBuster = `?t=${Date.now()}`;
            const response = await fetch(`${API_BASE}/${path}${cacheBuster}`, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (!response.ok) {
                if (response.status === 404) return null;
                throw new Error(`API 错误: ${response.status}`);
            }

            const data = await response.json();
            fileSha[path] = data.sha;
            
            if (data.encoding === 'base64') {
                const content = atob(data.content);
                const frontmatter = parseFrontmatter(content);
                return frontmatter;
            }
            return { data: {} };
        }

        function parseFrontmatter(content) {
            const match = content.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
            if (!match) return { data: {}, body: content };

            const yamlStr = match[1];
            const body = match[2] || '';

            try {
                // Use js-yaml for reliable parsing
                if (window.jsyaml) {
                    const data = window.jsyaml.load(yamlStr) || {};
                    return { data, body };
                }
            } catch(e) {
                console.warn('js-yaml parse failed, using fallback', e);
            }

            // Fallback: simple parser
            const data = {};
            const lines = yamlStr.split('\n');
            let currentKey = null;
            let inArray = false;
            let arrayItems = [];
            let arrayKey = null;
            let currentObj = null;

            for (const line of lines) {
                if (line.trim() === '') continue;

                // Nested object property (4+ spaces)
                const nestedMatch = line.match(/^\s{4}(\w+):\s*"?(.*?)"?\s*$/);
                if (nestedMatch && inArray && arrayItems.length > 0) {
                    const lastItem = arrayItems[arrayItems.length - 1];
                    if (typeof lastItem === 'object' && lastItem !== null) {
                        lastItem[nestedMatch[1]] = nestedMatch[2].replace(/^["']|["']$/g, '');
                    }
                    continue;
                }

                // Dash-only line (new object in array)
                if (line.match(/^\s{2}-\s*$/)) {
                    if (inArray) {
                        arrayItems.push({});
                    }
                    continue;
                }

                // Array start (key: with no value)
                if (line.match(/^(\w+):\s*$/)) {
                    if (inArray && arrayKey) {
                        data[arrayKey] = arrayItems;
                        arrayItems = [];
                        inArray = false;
                        arrayKey = null;
                    }
                    currentKey = line.match(/^(\w+):\s*$/)[1];
                    inArray = true;
                    arrayKey = currentKey;
                    arrayItems = [];
                    data[currentKey] = [];
                    continue;
                }

                // Key-value pair
                if (line.match(/^(\w+):\s*(.+)/)) {
                    if (inArray && arrayKey) {
                        data[arrayKey] = arrayItems;
                        arrayItems = [];
                        inArray = false;
                        arrayKey = null;
                    }
                    const [, key, value] = line.match(/^(\w+):\s*(.+)/);
                    data[key] = extractValue(value);
                    continue;
                }
            }

            if (inArray && arrayKey) {
                data[arrayKey] = arrayItems;
            }

            return { data, body };
        }

        function extractValue(str) {
            str = str.trim();
            if ((str.startsWith('"') && str.endsWith('"')) || 
                (str.startsWith("'") && str.endsWith("'"))) {
                return str.slice(1, -1);
            }
            return str;
        }

        async function fetchDirectory(path) {
            const response = await fetch(`${API_BASE}/${path}?t=${Date.now()}`, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (!response.ok) {

                throw new Error(`API 错误: ${response.status}`);

        async function saveFile(path, content, message) {
            const encoded = btoa(unescape(encodeURIComponent(content)));
            
            const body = {
                message: message || `更新 ${path}`,
                content: encoded,
                branch: BRANCH
            };

            if (fileSha[path]) {
                body.sha = fileSha[path];
            }

            const response = await fetch(`${API_BASE}/${path}?t=${Date.now()}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.message || `API 错误: ${response.status}`);
            }

            const data = await response.json();
            fileSha[path] = data.content.sha;
            return data;
        }

        async function saveJsonFile(path, data, message) {
            return saveFile(path, JSON.stringify(data, null, 2), message);
        }

        async function saveMarkdownFile(path, frontmatter, body, message) {
            let content = '---\n';
            for (const [key, value] of Object.entries(frontmatter)) {
                content += formatYamlValue(key, value);
            }
            content += '---\n';
            if (body) {
                content += '\n' + body;
            }
            return saveFile(path, content, message);
        }

        function formatYamlValue(key, value, indent = '') {
            if (Array.isArray(value)) {
                if (value.length === 0) return `${indent}${key}: []\n`;
                let str = `${indent}${key}:\n`;
                for (const item of value) {
                    if (typeof item === 'object' && item !== null) {
                        str += `${indent}  -\n`;
                        for (const [k, v] of Object.entries(item)) {
                            str += `${indent}    ${k}: "${escapeYaml(v)}"\n`;
                        }
                    } else {
                        str += `${indent}  - "${escapeYaml(item)}"\n`;
                    }
                }
                return str;
            } else if (typeof value === 'object' && value !== null) {
                let str = `${indent}${key}:\n`;
                for (const [k, v] of Object.entries(value)) {
                    str += `${indent}  ${k}: "${escapeYaml(v)}"\n`;
                }
                return str;
            } else {
                return `${indent}${key}: "${escapeYaml(value)}"\n`;
            }
        }

        function escapeYaml(value) {
            if (value === null || value === undefined) return '';
            return String(value).replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n');
        }

                if (section === 'jewelry-products' || section === 'watch-products') {
                    // Special handling for product management
                    await loadProductSection(section);
                } else if (sectionInfo.loadFiles) {
                    // Load directory listing
                    const dirPath = sectionInfo.files[0].path;
                    const files = await fetchDirectory(dirPath);
                    const filteredFiles = sectionInfo.filter 
                        ? files.filter(sectionInfo.filter) 
                        : files.filter(f => f.type === 'file');

                    panelTabs.innerHTML = '<div class="panel-tab active">全部项目</div>';

                        container.innerHTML = '<div class="list-editor" id="productList"></div>';
                        const listContainer = document.getElementById('productList');

                        for (const file of filteredFiles) {
                            // Handle different file types
                            if (file.name.endsWith('.json')) {
                                const content = await fetchJsonFile(file.path);
                                sectionData[file.path] = content;
                                renderProductItem(listContainer, file, content);
                            } else {
                                const content = await fetchMarkdownFile(file.path);
                                sectionData[file.path] = content;
                                renderProductItem(listContainer, file, content);
                            }
                        }
                    }
                } else {
                    // Single file sections
                    const file = sectionInfo.files[0];
                    
                    if (file.type === 'json') {
                        const content = await fetchJsonFile(file.path);
                        sectionData[file.path] = content;
                        renderJsonEditorFromData(file.path, content);
                    } else if (file.type === 'faq-items-json') {
                        // FAQ items as a combined JSON array
                        const content = await fetchJsonFile(file.path);
                        sectionData[file.path] = content;
                        renderFaqItemsEditor(file.path, content);
                    } else if (file.type === 'featured-json') {
                        // Featured products manager
                        const content = await fetchJsonFile(file.path);
                        sectionData[file.path] = content;
                        renderFeaturedManager(file.path, content);
                    } else if (file.type === 'markdown') {
                        const content = await fetchMarkdownFile(file.path);
                        sectionData[file.path] = content;
                        renderMarkdownEditor(file.path, content);
                    }
                }
            } catch (error) {
                console.error('加载错误:', error);
                panelContent.innerHTML = `
                    <div class="empty-state">
                        <p>加载内容出错: ${error.message}</p>
                    </div>
                `;
                showToast('加载内容失败: ' + error.message, 'error');
            }
        }

        // Category Manager Functions
        window.openCategoryManager = async function(productType) {
            const settingsPath = productType === 'jewelry' ? 'content/jewelry/jewelry.json' : 'content/watches/watches.json';
            const productDir = `content/${productType}/products`;
            
            // Load categories and products
            const settings = await fetchJsonFile(settingsPath);
            const categories = settings.categories || [];
            
            // Count products per category
            const files = await fetchDirectory(productDir);
            const productFiles = files.filter(f => f.name.endsWith('.json'));
            
            const productCountMap = {};
            for (const file of productFiles) {
                const content = await fetchJsonFile(file.path);
                const data = content.data || content || {};
                const cat = data.category || '';
                productCountMap[cat] = (productCountMap[cat] || 0) + 1;
            }
            
            // Create modal
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.id = 'categoryManagerModal';
            overlay.onclick = (e) => {
                if (e.target === overlay) closeCategoryManager();
            };
            
            const title = productType === 'jewelry' ? '珠宝分类管理' : '手表分类管理';
            
            overlay.innerHTML = `
                <div class="category-manager-modal">
                    <div class="product-modal-header">
                        <h3>${title}</h3>
                        <button class="product-modal-close" onclick="closeCategoryManager()">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="category-manager-body">
                        <div class="category-list" id="categoryList"></div>
                        <button class="add-category-btn" onclick="addNewCategory()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            添加新分类
                        </button>
                    </div>
                    <div class="product-modal-footer">
                        <button class="btn-cancel" onclick="closeCategoryManager()">取消</button>
                        <button class="btn-save" onclick="saveCategories('${productType}')">保存修改</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(overlay);
            
            // Store data for later use
            window._categoryManagerData = {
                settingsPath: settingsPath,
                categories: JSON.parse(JSON.stringify(categories)),
                productCountMap: productCountMap,
                newCategories: []
            };
            
            renderCategoryList();
        };

        window.closeCategoryManager = function() {
            const modal = document.getElementById('categoryManagerModal');
            if (modal) modal.remove();
            window._categoryManagerData = null;
        };

        function renderCategoryList() {
            const list = document.getElementById('categoryList');
            if (!list || !window._categoryManagerData) return;
            
            const { categories, newCategories, productCountMap } = window._categoryManagerData;
            
            let html = '';
            
            // Render existing categories
            categories.forEach((cat, index) => {
                const isSystem = cat.id === 'all';
                const productCount = productCountMap[cat.id] || 0;
                
                html += `
                    <div class="category-item ${isSystem ? 'system-category' : ''}" data-index="${index}" data-id="${cat.id}">
                        <div class="category-item-info">
                            <div class="category-item-name">${isSystem ? cat.name + ' (系统分类)' : cat.name}</div>
                            <div class="category-item-id">ID: ${cat.id}</div>
                            ${productCount > 0 ? `<div class="category-item-id" style="color: #C5A467;">包含 ${productCount} 个产品</div>` : ''}
                        </div>
                        <div class="category-item-actions">
                            ${isSystem ? '' : `
                                <button class="btn-edit-cat" onclick="editCategory(${index})">编辑</button>
                                <button class="btn-delete-cat" onclick="deleteCategory(${index})">删除</button>
                            `}
                        </div>
                    </div>
                `;
            });
            
            // Render new categories
            newCategories.forEach((cat, index) => {
                html += `
                    <div class="category-item" data-new-index="${index}">
                        <input type="text" value="${cat.name}" placeholder="分类名称" oninput="updateNewCategoryName(${index}, this.value)">
                        <div class="category-item-info">
                            <div class="category-item-id">ID: ${cat.id || '...'}</div>
                        </div>
                        <div class="category-item-actions">
                            <button class="btn-delete-cat" onclick="removeNewCategory(${index})">删除</button>
                        </div>
                    </div>
                `;
            });
            
            if (categories.length === 0 && newCategories.length === 0) {
                html = '<p style="text-align:center;color:var(--text-secondary);padding:20px;">暂无分类</p>';
            }
            
            list.innerHTML = html;
        }

        function generateIdFromName(name) {
            return name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        }

        window.updateNewCategoryName = function(index, name) {
            if (!window._categoryManagerData) return;
            window._categoryManagerData.newCategories[index].name = name;
            window._categoryManagerData.newCategories[index].id = generateIdFromName(name);
            renderCategoryList();
        };

        window.addNewCategory = function() {
            if (!window._categoryManagerData) return;
            window._categoryManagerData.newCategories.push({
                name: '',
                id: ''
            });
            renderCategoryList();
        };

        window.removeNewCategory = function(index) {
            if (!window._categoryManagerData) return;
            window._categoryManagerData.newCategories.splice(index, 1);
            renderCategoryList();
        };

        window.editCategory = function(index) {
            const item = document.querySelector(`.category-item[data-index="${index}"]`);
            if (!item) return;
            
            const cat = window._categoryManagerData.categories[index];
            const productCount = window._categoryManagerData.productCountMap[cat.id] || 0;
            
            item.innerHTML = `
                <input type="text" value="${cat.name}" id="editCatName${index}" placeholder="分类名称">
                <div class="category-item-info">
                    <div class="category-item-id">ID: <span id="editCatId${index}">${cat.id}</span></div>
                    ${productCount > 0 ? `<div class="category-item-id" style="color: #C5A467;">包含 ${productCount} 个产品</div>` : ''}
                </div>
                <div class="category-item-actions">
                    <button class="btn-save-cat" onclick="saveCategoryEdit(${index})">保存</button>
                    <button class="btn-cancel-cat" onclick="cancelCategoryEdit(${index})">取消</button>
                </div>
            `;
            
            // Add input event listener for auto-generating ID
            const input = document.getElementById(`editCatName${index}`);
            input.addEventListener('input', function() {
                const newIdSpan = document.getElementById(`editCatId${index}`);
                if (newIdSpan) {
                    newIdSpan.textContent = generateIdFromName(this.value);
                }
            });
            input.focus();
        };

        window.cancelCategoryEdit = function(index) {
            renderCategoryList();
        };

        window.saveCategoryEdit = function(index) {
            if (!window._categoryManagerData) return;
            
            const input = document.getElementById(`editCatName${index}`);
            const newName = input.value.trim();
            
            if (!newName) {
                alert('分类名称不能为空');
                return;
            }
            
            const oldId = window._categoryManagerData.categories[index].id;
            const newId = generateIdFromName(newName);
            
            // Update category
            window._categoryManagerData.categories[index].name = newName;
            window._categoryManagerData.categories[index].id = newId;
            
            // Update product count map keys if ID changed
            if (oldId !== newId && window._categoryManagerData.productCountMap[oldId]) {
                window._categoryManagerData.productCountMap[newId] = window._categoryManagerData.productCountMap[oldId];
                delete window._categoryManagerData.productCountMap[oldId];
            }
            
            renderCategoryList();
        };

        window.deleteCategory = async function(index) {
            if (!window._categoryManagerData) return;
            
            const cat = window._categoryManagerData.categories[index];
            const productCount = window._categoryManagerData.productCountMap[cat.id] || 0;
            
            let confirmMsg = `确定要删除分类 "${cat.name}" 吗？`;
            if (productCount > 0) {
                confirmMsg = `分类 "${cat.name}" 下有 ${productCount} 个产品。\n\n删除后，这些产品的分类将被清空。\n\n确定要继续吗？`;
            }
            
            if (!confirm(confirmMsg)) return;
            
            // Clear category for products using this category
            if (productCount > 0) {
                const productType = window._categoryManagerData.settingsPath.includes('jewelry') ? 'jewelry' : 'watch';
                const productDir = `content/${productType}/products`;
                
                try {
                    const files = await fetchDirectory(productDir);
                    const productFiles = files.filter(f => f.name.endsWith('.json'));
                    
                    for (const file of productFiles) {
                        const content = await fetchJsonFile(file.path);
                        const data = content.data || content || {};
                        
                        if (data.category === cat.id) {
                            // Update product to clear category
                            if (content.data) {
                                content.data.category = '';
                            } else {
                                content.category = '';
                            }
                            await saveJsonFile(file.path, content, `清除产品 "${data.name}" 的分类`);
                        }
                    }
                } catch (e) {
                    console.error('更新产品分类失败:', e);
                    alert('更新产品分类时出错');
                    return;
                }
            }
            
            // Remove category
            window._categoryManagerData.categories.splice(index, 1);
            delete window._categoryManagerData.productCountMap[cat.id];
            
            renderCategoryList();
        };

        window.saveCategories = async function(productType) {
            if (!window._categoryManagerData) return;
            
            const { settingsPath, categories, newCategories } = window._categoryManagerData;
            
            // Validate new categories
            for (const cat of newCategories) {
                if (!cat.name.trim()) {
                    alert('新分类名称不能为空');
                    return;
                }
                if (!cat.id) {
                    alert('新分类ID不能为空');
                    return;
                }
            }
            
            // Check for duplicate IDs
            const allCategories = [...categories, ...newCategories];
            const ids = allCategories.map(c => c.id);
            const duplicateIds = ids.filter((id, index) => ids.indexOf(id) !== index);
            if (duplicateIds.length > 0) {
                alert(`分类ID重复: ${duplicateIds.join(', ')}`);
                return;
            }
            
            // Merge all categories (new categories first, then existing, with "all" at the beginning)
            const allCategoriesFinal = [
                { id: 'all', name: 'All' },
                ...newCategories,
                ...categories.filter(c => c.id !== 'all')
            ];
            
            try {
                // Load current settings
                const settings = await fetchJsonFile(settingsPath);
                settings.categories = allCategoriesFinal;
                
                // Save settings
                await saveJsonFile(settingsPath, settings, `更新 ${productType === 'jewelry' ? '珠宝' : '手表'} 分类`);
                
                showToast('分类保存成功！');
                closeCategoryManager();
                
                // Refresh product section
                await loadSection(productType + '-products');
            } catch (error) {
                console.error('保存分类失败:', error);
                alert('保存分类失败: ' + error.message);
            }
        };

        // Filter products by category
        window.filterProducts = function(category, productType) {
            // Update filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === category);
            });

            // Show/hide product cards
            document.querySelectorAll('.product-card').forEach(card => {
                const cardCategory = card.dataset.category;
                if (category === 'all' || cardCategory === category) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
        };

        // Render product card
        function renderProductCard(container, file, content, productType) {
            const data = content.data || content || {};
            const name = data.name || '未命名产品';
            const price = data.price || '';
            const category = data.category || '';
            const images = data.images || (data.image ? [data.image] : []);
            const firstImage = images[0] || '';
            const imgSrc = firstImage.startsWith('http') ? firstImage : `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${firstImage.startsWith('/') ? firstImage.substring(1) : firstImage}`;
            const published = data.published !== false;
            const slug = file.name.replace(/\.(json|md)$/, '');

            const card = document.createElement('div');
            card.className = 'product-card';
            card.dataset.category = category;
            card.dataset.path = file.path;

            card.innerHTML = `
                <div class="product-card-image">
                    ${imgSrc 
                        ? `<img src="${imgSrc}" alt="${name}" onerror="this.parentElement.innerHTML='<div class=\\'placeholder\\'><svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.5\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\' ry=\\'2\\'></rect><circle cx=\\'8.5\\' cy=\\'8.5\\' r=\\'1.5\\'></circle><polyline points=\\'21 15 16 10 5 21\\'></polyline></svg></div>'">`
                        : `<div class="placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </div>`
                    }
                </div>
                <div class="product-card-body">
                    <div class="product-card-category">${category}</div>
                    <div class="product-card-name">${name}</div>
                    <div class="product-card-price">${price}</div>
                    <div class="product-card-footer">
                        <span class="product-status ${published ? 'published' : 'draft'}">${published ? '已发布' : '草稿'}</span>
                        <div class="product-card-actions">
                            <button class="btn-edit" onclick="openProductModal('${file.path}', '${productType}')">编辑</button>
                            <button class="btn-delete" onclick="confirmDeleteProduct('${file.path}', '${productType}')">删除</button>
                        </div>
                    </div>
                </div>
            `;

            container.appendChild(card);
        }

        // Confirm delete product
        window.confirmDeleteProduct = async function(path, productType) {
            if (!confirm('确定要删除此产品吗？此操作无法撤销。')) return;

            try {
                const response = await fetch(`${API_BASE}/${path}?t=${Date.now()}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `删除产品: ${path.split('/').pop()}`,
                        sha: fileSha[path],
                        branch: BRANCH
                    })
                });

                if (!response.ok) {
                    throw new Error('删除失败');
                }

                showToast('删除成功！');
                await rebuildProductsIndex(productType);
                await loadSection(productType + '-products');
            } catch (error) {
                showToast('删除失败: ' + error.message, 'error');
            }
        };

            try {
                showToast('正在上传图片...');
                const result = await uploadImageToGitHub(file, uploadDir, `product_${Date.now()}`, `${currentProductType}-products`);
                
                // Insert at correct position
                if (index <= currentProductImages.length) {
                    currentProductImages.splice(index, 0, result.path);
                } else {
                    currentProductImages.push(result.path);

                showToast('图片上传成功！');
                renderImageGallery();

        // Save product
        window.saveProduct = async function() {
            const name = document.getElementById('productName').value.trim();
            const subtitle = document.getElementById('productSubtitle').value.trim();
            const price = document.getElementById('productPrice').value.trim();
            const category = document.getElementById('productCategory').value;
            const description = document.getElementById('productDescription').value.trim();
            const order = parseInt(document.getElementById('productOrder').value) || 1;
            const published = document.getElementById('productPublished').checked;

            if (!name) {
                showToast('请输入产品名称', 'error');
                return;
            }

            // Generate slug from name
            const slug = name.toLowerCase()
                .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, '-')
                .replace(/^-+|-+$/g, '')
                .substring(0, 50);
            
            const productDir = `content/${currentProductType === 'watch' ? 'watches' : currentProductType}/products`;
            const filename = `${slug}.json`;
            const newPath = `${productDir}/${filename}`;
            
            // If editing and slug changed, use new path and delete old file
            let path = newPath;
            let oldPathToDelete = null;
            if (editingProductPath && editingProductPath !== newPath) {
                oldPathToDelete = editingProductPath;
            }

            // Build product data as JSON
            const productData = {
                name: name,
                subtitle: subtitle,
                price: price,
                category: category,
                description: description,
                images: currentProductImages,
                order: order,
                published: published
            };

            try {
                await saveJsonFile(path, productData, `保存产品: ${name}`);
                
                // Track saved product for index rebuild (handles GitHub API delay)
                window._lastSavedProduct = {
                    type: currentProductType,
                    slug: slug,
                    path: path,
                    data: productData
                };
                
                // Delete old file if slug changed
                if (oldPathToDelete) {
                    try {
                        // Get SHA of old file first
                        const checkResponse = await fetch(`${API_BASE}/${oldPathToDelete}?t=${Date.now()}`, {
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Accept': 'application/vnd.github.v3+json'
                            }
                        });
                        if (checkResponse.ok) {
                            const oldFileData = await checkResponse.json();
                            await fetch(`${API_BASE}/${oldPathToDelete}`, {
                                method: 'DELETE',
                                headers: {
                                    'Authorization': `Bearer ${token}`,
                                    'Accept': 'application/vnd.github.v3+json',
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    message: `删除旧产品文件（名称已更改）`,
                                    sha: oldFileData.sha,
                                    branch: BRANCH
                                })
                            });
                        }
                    } catch (e) {
                        console.warn('删除旧文件失败:', e);
                    }
                }
                
                await rebuildProductsIndex(currentProductType);
                showToast('保存成功！');
                closeProductModal();
                await loadSection(currentProductType + '-products');
            } catch (error) {
                showToast('保存失败: ' + error.message, 'error');
            }
        };

        // Rebuild products-index.json after save/delete
        async function rebuildProductsIndex(productType) {
            try {
                const productDir = `content/${productType === 'watch' ? 'watches' : productType}/products`;
                // Fetch directory listing from GitHub
                const files = await fetchDirectory(productDir);
                const jsonFiles = files.filter(f => f.name.endsWith('.json'));
                const products = [];
                
                for (const file of jsonFiles) {
                    try {
                        const content = await fetchJsonFile(file.path);
                        const data = content.data || content || {};
                        products.push({
                            ...data,
                            _slug: file.name.replace('.json', ''),
                            _path: file.path
                        });
                    } catch(e) {
                        console.warn('读取产品文件失败:', file.path, e);
                    }
                }
                
                // Also check if the just-saved product is in the list
                // (GitHub API may have a few seconds delay, so we manually add it if missing)
                if (window._lastSavedProduct && window._lastSavedProduct.type === productType) {
                    const saved = window._lastSavedProduct;
                    const existingIdx = products.findIndex(p => p._slug === saved.slug);
                    if (existingIdx >= 0) {
                        // Update existing entry
                        products[existingIdx] = { ...saved.data, _slug: saved.slug, _path: saved.path };
                    } else {
                        // Add new entry
                        products.push({ ...saved.data, _slug: saved.slug, _path: saved.path });
                    }
                    window._lastSavedProduct = null;
                }
                
                // Sort by order
                products.sort((a, b) => (a.order || 999) - (b.order || 999));
                
                await saveJsonFile(`content/${productType === 'watch' ? 'watches' : productType}/products-index.json`, products, `更新产品索引`);
            } catch (e) {
                console.error('重建产品索引失败:', e);
            }
        }

        // Enhanced upload function for products
        async function uploadImageToGitHub(file, uploadDir, fieldName, section) {
            return new Promise(async (resolve, reject) => {
                try {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const base64 = e.target.result.split(',')[1];
                        const extension = file.name.split('.').pop().toLowerCase();
                        
                        // Generate filename with timestamp
                        const cleanName = (typeof fieldName === 'string' ? fieldName : 'image').replace(/[^a-zA-Z0-9]/g, '_');
                        const timestamp = Date.now();
                        const filename = `${cleanName}_${timestamp}.${extension}`;
                        const fullPath = uploadDir.endsWith('/') ? uploadDir + filename : uploadDir + '/' + filename;

                        // Check if file exists and get sha
                        let sha = null;
                        try {
                            const checkResponse = await fetch(`${API_BASE}/${fullPath}?t=${Date.now()}`, {
                                headers: {
                                    'Authorization': `Bearer ${token}`,
                                    'Accept': 'application/vnd.github.v3+json'
                                }
                            });
                            if (checkResponse.ok) {
                                const existingFile = await checkResponse.json();
                                sha = existingFile.sha;
                            }
                        } catch (err) {
                            // File doesn't exist, that's fine
                        }

                        // Upload file
                        const body = {
                            message: `Upload image: ${filename}`,
                            content: base64,
                            branch: BRANCH
                        };
                        if (sha) {
                            body.sha = sha;
                        }

                        const response = await fetch(`${API_BASE}/${fullPath}?t=${Date.now()}`, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Accept': 'application/vnd.github.v3+json',
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(body)
                        });

                        if (!response.ok) {
                            const err = await response.json();
                            throw new Error(err.message || `上传失败: ${response.status}`);
                        }

                        const data = await response.json();
                        resolve({
                            path: `/${data.content.path}`,
                            filename: filename
                        });
                    };
                    reader.onerror = () => reject(new Error('读取文件失败'));
                    reader.readAsDataURL(file);
                } catch (error) {
                    reject(error);
                }
            });
        }

        function createFormField(label, name, value, type = 'text', options = null) {
            if (type === 'textarea') {
                return `

                        <label>${label}</label>
                        <textarea name="${name}">${value || ''}</textarea>
                    </div>
                `;
            } else if (type === 'select' && options) {
                const opts = options.map(opt => `<option value="${opt}" ${value === opt ? 'selected' : ''}>${opt}</option>`).join('');
                return `
                    <div class="form-group">
                        <label>${label}</label>
                        <select name="${name}">${opts}</select>
                    </div>
                `;
            } else if (type === 'number') {
                return `
                    <div class="form-group">
                        <label>${label}</label>
                        <input type="number" name="${name}" value="${value || 0}">
                    </div>
                `;
            }
            return `
                <div class="form-group">
                    <label>${label}</label>
                    <input type="text" name="${name}" value="${value || ''}">
                </div>
            `;
        }
