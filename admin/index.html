<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Manager - Vespera Jewels</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #FAFAF8; color: #333; }
        .loading { text-align: center; }
        .loading h2 { color: #C5A467; }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <h2>Loading CMS...</h2>
        <p>Please wait while the admin panel loads.</p>
    </div>
    <script>
    // localStorage bridge: detect auth token stored by OAuth callback
    (function() {
      function checkAuthBridge() {
        try {
          var authResult = localStorage.getItem('decap-cms-auth-result');
          if (authResult) {
            localStorage.removeItem('decap-cms-auth-result');
            // Dispatch as message event for Decap CMS to pick up
            window.dispatchEvent(new MessageEvent('message', { data: authResult, origin: window.location.origin }));
          }
        } catch(e) {}
      }
      
      // Check immediately and periodically
      checkAuthBridge();
      setInterval(checkAuthBridge, 500);
    })();
    </script>
    <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js?v=20260514b"></script>
</body>
</html>
