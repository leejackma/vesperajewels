<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Manager - Vespera Jewels</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #FAFAF8; color: #333; }
        .loading { text-align: center; }
        .loading h2 { color: #C5A467; }
        .error { color: #e74c3c; display: none; text-align: center; max-width: 500px; padding: 20px; }
        .error a { color: #C5A467; }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <h2>Loading CMS...</h2>
        <p>Please wait while the admin panel loads.</p>
    </div>
    <div class="error" id="error">
        <h3>Failed to load CMS</h3>
        <p>Make sure you're accessing this page via HTTPS.</p>
        <p>Check the browser console for errors.</p>
    </div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js" onload="document.getElementById('loading').style.display='none'" onerror="document.getElementById('loading').style.display='none';document.getElementById('error').style.display='block'"></script>
</body>
</html>
