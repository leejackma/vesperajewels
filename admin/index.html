<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Manager - Vespera Jewels</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #FAFAF8; color: #333; }
        .loading { text-align: center; }
        .loading h2 { color: #C5A467; }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <h2>Loading CMS...</h2>
        <p>Please wait while the admin panel loads.</p>
    </div>
    <script>
    // Check if we're returning from OAuth with a token in the hash
    (function() {
      var hash = window.location.hash;
      if (hash && hash.indexOf('access_token=') !== -1) {
        var token = hash.split('access_token=')[1].split('&')[0];
        if (token) {
          // Store auth data in Decap CMS expected format
          var authData = {
            token: token,
            provider: 'github'
          };
          localStorage.setItem('decap-cms-user', JSON.stringify(authData));
          // Clean the URL hash
          history.replaceState(null, '', window.location.pathname);
        }
      }
    })();
    </script>
    <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js?v=20260514c"></script>
</body>
</html>
