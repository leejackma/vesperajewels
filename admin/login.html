<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Vespera Jewels 管理后台</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #C5A467;
            --gold-dark: #B8924A;
            --bg: #FAFAF8;
            --white: #FFFFFF;
            --dark: #0F0F0F;
            --text: #1A1A1A;
            --text-secondary: #8A8A8A;
            --border: #E8E4DE;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(197, 164, 103, 0.15);
            padding: 50px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--gold);
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .logo p {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: var(--gold);
            margin: 0 auto 30px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--text);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: var(--bg);
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(197, 164, 103, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--gold-dark);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn.loading {
            position: relative;
            color: transparent;
        }

        .btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--white);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .message {
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: left;
            display: none;
        }

        .message.error {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FECACA;
            display: block;
        }

        .message.success {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #A7F3D0;
            display: block;
        }

        .help-text {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
        }

        .help-text h4 {
            font-size: 13px;
            color: var(--text);
            margin-bottom: 10px;
        }

        .help-text p {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .help-text a {
            color: var(--gold);
            text-decoration: none;
        }

        .help-text a:hover {
            text-decoration: underline;
        }

        .features {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            justify-content: center;
        }

        .feature {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .feature svg {
            width: 14px;
            height: 14px;
            fill: var(--gold);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 25px;
            }
            .logo h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>VESPERA</h1>
            <p>Jewels Admin</p>
        </div>
        
        <div class="divider"></div>
        
        <h2>欢迎回来</h2>
        <p class="subtitle">使用您的 GitHub 个人访问令牌登录</p>

        <div id="message" class="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="token">GitHub 个人访问令牌</label>
                <input 
                    type="password" 
                    id="token" 
                    placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
                    autocomplete="off"
                    required
                >
            </div>

            <button type="submit" class="btn" id="loginBtn">
                登录
            </button>
        </form>

        <div class="help-text">
            <h4>如何获取个人访问令牌：</h4>
            <p>
                1. 进入 <a href="https://github.com/settings/tokens" target="_blank">GitHub 设置 → Personal Access Tokens</a><br>
                2. 点击 "Generate new token (classic)"<br>
                3. 选择权限范围：<strong>repo</strong>（完全控制）<br>
                4. 复制并粘贴上方的令牌
            </p>
            <div class="features">
                <span class="feature">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    安全
                </span>
                <span class="feature">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    无需 OAuth
                </span>
            </div>
        </div>
    </div>

    <script>
        const REPO_OWNER = 'leejackma';
        const REPO_NAME = 'vesperajewels';
        const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;

        const loginForm = document.getElementById('loginForm');
        const tokenInput = document.getElementById('token');
        const loginBtn = document.getElementById('loginBtn');
        const messageDiv = document.getElementById('message');

        // Check if already logged in
        const savedToken = localStorage.getItem('gh_pat');
        if (savedToken) {
            window.location.href = 'dashboard.html';
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }

        function hideMessage() {
            messageDiv.style.display = 'none';
        }

        async function validateToken(token) {
            try {
                const response = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.status === 401) {
                    return { valid: false, error: '令牌无效，请检查后重试。' };
                }

                if (!response.ok) {
                    return { valid: false, error: `API 错误: ${response.status}` };
                }

                const user = await response.json();
                return { valid: true, user };
            } catch (error) {
                return { valid: false, error: '网络错误，请检查您的网络连接。' };
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const token = tokenInput.value.trim();
            if (!token) {
                showMessage('请输入您的 GitHub 令牌。', 'error');
                return;
            }

            if (!token.startsWith('ghp_') && !token.startsWith('github_pat_')) {
                showMessage('令牌应以 "ghp_" 或 "github_pat_" 开头。', 'error');
                return;
            }

            // Set loading state
            loginBtn.disabled = true;
            loginBtn.classList.add('loading');
            loginBtn.textContent = '';

            try {
                const result = await validateToken(token);

                if (result.valid) {
                    // Save token
                    localStorage.setItem('gh_pat', token);
                    localStorage.setItem('gh_user', JSON.stringify(result.user));
                    
                    showMessage('登录成功！正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    showMessage(result.error, 'error');
                    loginBtn.disabled = false;
                    loginBtn.classList.remove('loading');
                    loginBtn.textContent = '登录';
                }
            } catch (error) {
                showMessage('发生未知错误。', 'error');
                loginBtn.disabled = false;
                loginBtn.classList.remove('loading');
                loginBtn.textContent = '登录';
            }
        });
    </script>
</body>
</html>
